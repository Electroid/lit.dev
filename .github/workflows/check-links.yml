name: Check links

on: [push, pull_request]

jobs:
  check-links:
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: google/wireit@setup-github-actions-caching/v1
      - uses: actions/checkout@v3
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install
      - run: bun run test:links
